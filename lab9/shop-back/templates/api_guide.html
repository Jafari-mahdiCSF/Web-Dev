<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Lab 9 API Guide</title>
    <style>
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #f8fafc;
        color: #0f172a;
      }
      .wrap {
        max-width: 860px;
        margin: 40px auto;
        background: #fff;
        border: 1px solid #e2e8f0;
        border-radius: 12px;
        padding: 24px;
      }
      h1 {
        margin-top: 0;
      }
      .links {
        display: grid;
        gap: 10px;
      }
      a {
        display: inline-block;
        text-decoration: none;
        color: #0f172a;
        border: 1px solid #cbd5e1;
        border-radius: 10px;
        padding: 10px 12px;
        background: #f8fafc;
      }
      a:hover {
        border-color: #64748b;
      }
      code {
        background: #f1f5f9;
        padding: 2px 6px;
        border-radius: 4px;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1>Lab 9 Backend Guide</h1>
      <p>Use these links to quickly navigate API routes while your frontend runs on <code>localhost:4200</code>.</p>
      <div class="links">
        <a href="/api/categories/" target="_blank" rel="noopener noreferrer">GET /api/categories/</a>
        <a href="/api/products/" target="_blank" rel="noopener noreferrer">GET /api/products/</a>
        <a href="/api/categories/1/products/" target="_blank" rel="noopener noreferrer">GET /api/categories/1/products/</a>
        <a href="/admin/" target="_blank" rel="noopener noreferrer">Open Django Admin</a>
      </div>
    </div>
  </body>
</html>
